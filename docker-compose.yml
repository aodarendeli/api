services:
  app:
    image: ghcr.io/${GITHUB_REPOSITORY}:latest
    container_name: api
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      PORT: ${PORT}
      REDIS_TTL: 3600
      LOG_LEVEL: info
      RATE_LIMIT_WINDOW_MS: 900000
      RATE_LIMIT_MAX: 100
      APP_CACHE_PREFIX: app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - proxy 
networks:
  proxy:
    external: true
